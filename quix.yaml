      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: quix-pipeline-monitor
    network:
      ports:
        - port: 80
          targetPort: 8081
    plugin:
      embeddedView:
        enabled: true
        default: true
      sidebarItem:
        show: true
        label: Pipeline Monitor
        icon: insights
        order: 4
      globalItem:
        show: true
        icon: insights
        order: 0
