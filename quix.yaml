# Quix Project Descriptor
# This file describes the data pipeline and configuration of resources of a Quix Project.

metadata:
  version: 1.0

# This section describes the Deployments of the data pipeline
deployments:
  - name: Demo Data Source
    application: demo-data-source-3
    version: latest
    deploymentType: Job
    resources:
      cpu: 200
      memory: 200
      replicas: 1
    variables:
      - name: output
        inputType: OutputTopic
        description: Name of the output topic to write into
        required: true
        value: f1-data
  - name: InfluxDB v1
    application: influxdb-v1
    version: latest
    deploymentType: Service
    resources:
      cpu: 1000
      memory: 8000
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: influxdb
    network:
      serviceName: influxdb
      ports:
        - port: 80
          targetPort: 8086
    variables:
      - name: INFLUXDB_ADMIN_USER_r7er67e
        inputType: FreeText
        description: Admin username to initialize InfluxDB with
        required: true
        value: admin
      - name: INFLUXDB_ADMIN_PASSWORD_2847242378
        inputType: Secret
        description: Admin password to initialize InfluxDB with
        required: true
        secretKey: kkkk
      - name: INFLUXDB_DB
        inputType: FreeText
        description: Database name to initialize InfluxDB with
        value: quix

# This section describes the Topics of the data pipeline
topics:
  - name: f1-data
