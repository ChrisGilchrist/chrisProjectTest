name: Transformation with tests template
language: python
variables:
  - name: input
    inputType: InputTopic
    description: Name of the input topic to listen to.
    defaultValue: csv-data
  - name: output
    inputType: OutputTopic
    description: Name of the output topic to write to.
    defaultValue: transform
  - name: group1
    inputType: VariableGroup
    multiline: false
    description: Per-environment toggles for in-progress features.
    variableGroupId: feature-flags
    variableGroupName: Feature Flags
    variableGroupDescription: Per-environment toggles for in-progress features.
    variables:
      - key: FEATURE_NEW_DASHBOARD
        description: New dashboard
        defaultValue: k
        secret: true
        required: true
      - key: FEATURE_BETA_PIPELINES
        description: Beta pipelines
        defaultValue: k
        secret: true
        required: true
      - key: FEATURE_AI_ASSIST
        description: AI assist
        defaultValue: k
        required: true
dockerfile: dockerfile
runEntryPoint: main.py
defaultFile: main.py
libraryItemId: transformation-with-tests
